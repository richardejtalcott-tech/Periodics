name: Build Periodic v4 Studio
on:
  push:
    branches: [ periodic-v4-studio ]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Enforce Java 17
        run: java -version 2>&1 | grep '17'
      - run: chmod +x gradlew
      - name: Fresh validated build
        run: |
          ./gradlew --stop || true
          ./gradlew --no-daemon clean assembleDebug testDebugUnitTest lintDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Periodic-v4-studio-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
