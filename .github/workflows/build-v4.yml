name: Build Periodic v4 True 3D
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: chmod +x gradlew
      - name: Compile, test and lint
        run: ./gradlew --no-daemon clean assembleDebug testDebugUnitTest lintDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Periodic-v4-true3d-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
