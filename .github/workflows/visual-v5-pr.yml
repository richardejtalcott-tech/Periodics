name: Visual Test Periodic v5 PR

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  visual-test:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "system-images;android-35;google_apis;x86_64" "emulator"

      - name: Generate pinned React Native project
        run: |
          npx @react-native-community/cli@20.0.0 init PeriodicV5 --version 0.86.0 --skip-git-init
          cp react-native/*.js PeriodicV5/
          cp react-native/app.json PeriodicV5/app.json
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Periodic<\/string>/' PeriodicV5/android/app/src/main/res/values/strings.xml
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="landscape"/' PeriodicV5/android/app/src/main/AndroidManifest.xml

      - name: Validate JavaScript source
        run: |
          node --check react-native/index.js
          node --check react-native/data.js

      - name: Build standalone release APK
        working-directory: PeriodicV5/android
        run: |
          chmod +x gradlew
          ./gradlew --stop || true
          ./gradlew --no-daemon clean assembleRelease testDebugUnitTest --stacktrace
          APK=app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          SIZE=$(stat -c%s "$APK")
          echo "Release APK size: $SIZE bytes"
          test "$SIZE" -gt 5000000
          unzip -l "$APK" | tee /tmp/apk-files.txt
          grep -q "assets/index.android.bundle" /tmp/apk-files.txt
          ! unzip -p "$APK" AndroidManifest.xml 2>/dev/null | grep -q "localhost:8081" || true

      - name: Install and launch standalone APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p visual-artifacts
            APK=PeriodicV5/android/app/build/outputs/apk/release/app-release.apk
            adb install -r "$APK"
            PACKAGE=$(aapt dump badging "$APK" | sed -n "s/package: name='\([^']*\)'.*/\1/p")
            echo "Package: $PACKAGE"
            adb shell settings put system accelerometer_rotation 0
            adb shell settings put system user_rotation 1
            adb shell monkey -p "$PACKAGE" 1
            sleep 12
            adb exec-out screencap -p > visual-artifacts/01-launch.png
            adb shell dumpsys activity activities > visual-artifacts/activity-state.txt
            adb shell logcat -d > visual-artifacts/logcat.txt
            ! grep -q "Unable to load script" visual-artifacts/logcat.txt
            ! grep -q "loadJSBundleFromAssets" visual-artifacts/logcat.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Periodic-v5-standalone-release
          path: |
            PeriodicV5/android/app/build/outputs/apk/release/app-release.apk
            visual-artifacts/
            PeriodicV5/android/app/build/reports/
          if-no-files-found: warn